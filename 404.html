<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">
<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="icon" type="image/svg+xml" href="images/favicon.svg">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Luxe Bakes Home 1 - Experience our elegant signature celebration cakes and artisanal sourdough bakes.">
  <title>Luxe Bakes - Elegant Celebration Cakes &amp; Artisan Sourdoughs</title>
  
  <!-- Typography & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* ----------------------------------------------------
       DESIGN SYSTEM & CSS VARIABLES
       ---------------------------------------------------- */
    :root {
      /* Typography */
      --font-logo: 'Playfair Display', serif;
      --font-main: 'Plus Jakarta Sans', sans-serif;
      --font-title: 'Outfit', sans-serif;
      
      /* Standard Transitions */
      --transition-smooth: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-fast: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      
      /* Layout Direction Helpers */
      --dir-sign: 1; /* 1 for LTR, -1 for RTL */
      
      /* Light Mode Palette - Royal Plum & Gold */
      --bg-primary: #FAF7F2;
      --bg-secondary: #FFFDFB;
      --bg-navbar: rgba(250, 247, 242, 0.85);
      --bg-card: #FFFFFF;
      --text-primary: #221617;
      --text-secondary: #6C595B;
      --text-muted: #9A8587;
      --accent-rose: #6B2335; /* Premium Burgundy/Plum */
      --accent-rose-hover: #531522;
      --accent-gold: #D4AF37; /* Vintage Champagne Gold */
      --accent-gold-hover: #C5A02E;
      --border-color: rgba(107, 35, 53, 0.08);
      --border-focus: var(--accent-rose);
      --shadow-sm: 0 4px 6px -1px rgba(107, 35, 53, 0.03);
      --shadow-md: 0 12px 20px -3px rgba(107, 35, 53, 0.05);
      --shadow-lg: 0 24px 36px -4px rgba(107, 35, 53, 0.08);
      --glass-blur: blur(16px);
      --toggle-track: #EFE9E2;
      
      scroll-behavior: smooth;
    }

    [data-theme="dark"] {
      /* Dark Mode Palette - Dusty Rose & Gold */
      --bg-primary: #181112;
      --bg-secondary: #21191B;
      --bg-navbar: rgba(24, 17, 18, 0.85);
      --bg-card: #281F21;
      --text-primary: #F7EFEF;
      --text-secondary: #CDBCBD;
      --text-muted: #9F8C8D;
      --accent-rose: #E59AA6;
      --accent-rose-hover: #ECA8B3;
      --accent-gold: #ECC772;
      --accent-gold-hover: #F7D485;
      --border-color: rgba(247, 239, 239, 0.08);
      --border-focus: var(--accent-rose);
      --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 12px 20px -3px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 24px 36px -4px rgba(0, 0, 0, 0.5);
      --toggle-track: #2D2123;
    }

    [dir="rtl"] {
      --dir-sign: -1;
    }

    /* ----------------------------------------------------
       RESET & BASE STYLES
       ---------------------------------------------------- */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
    }

    img {
      max-width: 100%;
      height: auto;
      display: inline-block;
    }

    button, input, select, textarea {
      font-family: inherit;
      color: inherit;
    }

    html {
      overflow-x: clip;
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-main);
      background-color: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      overflow-x: clip;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: var(--font-title);
      font-weight: 700;
      color: var(--text-primary);
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    button {
      font-family: inherit;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 24px;
      width: 100%;
    }

    /* ----------------------------------------------------
       HEADER & NAVBAR
       ---------------------------------------------------- */
    header {
      position: sticky;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background-color: var(--bg-navbar);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border-bottom: 1px solid var(--border-color);
      box-shadow: var(--shadow-sm);
    }

    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 74px; /* Reduced navbar height */
    }

    /* Left Side: Logo & Brand */
    .logo-container {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .logo-svg {
      width: 30px; /* Reduced logo size */
      height: 30px;
      flex-shrink: 0;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .logo-container:hover .logo-svg {
      transform: scale(1.1) rotate(8deg);
    }

    .logo-text {
      font-family: var(--font-title);
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--text-primary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    /* Center Section: Navigation Menu (10 items) */
    .nav-menu {
      display: flex;
      align-items: center;
      list-style: none;
      gap: 2px; /* Reduced gap */
    }

    .nav-item {
      position: relative;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 5px 8px; /* Reduced padding */
      font-family: var(--font-title);
      font-size: 0.65rem; /* Reduced font size */
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-primary);
      border-radius: 6px;
      white-space: nowrap;
      transition: var(--transition-fast);
    }

    .nav-link:hover {
      color: var(--accent-rose);
      background-color: rgba(107, 35, 53, 0.06);
    }

    .nav-link.active {
      color: var(--accent-rose);
      background-color: rgba(107, 35, 53, 0.04);
    }

    /* Underline animation on hover/active */
    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 50%;
      width: 16px; /* Reduced underline width */
      height: 3px;
      background-color: var(--accent-gold);
      border-radius: 2px;
      transform: translateX(-50%) scaleX(0);
      transition: var(--transition-fast);
    }

    .nav-link:hover::after,
    .nav-link.active::after {
      transform: translateX(-50%) scaleX(1);
    }

    /* Chevron Indicator Icon */
    .chevron-icon {
      width: 10px; /* Reduced chevron size */
      height: 10px;
      stroke-width: 2.5;
      transition: transform 0.25s ease;
    }

    .nav-item:hover .chevron-icon {
      transform: rotate(180deg);
    }

    /* Categories Dropdown Menu */
    .dropdown-menu {
      position: absolute;
      top: calc(100% + 8px);
      inset-inline-start: 50%;
      transform: translateX(calc(-50% * var(--dir-sign))) translateY(10px);
      background-color: var(--bg-card);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      box-shadow: var(--shadow-lg);
      padding: 6px;
      width: 140px;
      display: none;
      flex-direction: column;
      gap: 2px;
      opacity: 0;
      pointer-events: none;
      z-index: 110;
      transition: opacity 0.3s var(--transition-smooth), transform 0.3s var(--transition-smooth);
    }

    .nav-item:hover .dropdown-menu {
      display: flex;
      opacity: 1;
      pointer-events: auto;
      transform: translateX(calc(-50% * var(--dir-sign))) translateY(0);
    }

    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 6px;
      color: var(--text-primary);
      font-family: var(--font-title);
      font-size: 0.8rem;
      font-weight: 600;
      transition: var(--transition-fast);
    }

    .dropdown-item:hover {
      background-color: rgba(220, 161, 90, 0.08);
      color: var(--accent-gold);
    }

    /* Right Side Panel: Toggles & Button */
    .right-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* Dark Mode Toggle Button */
    .theme-btn {
      background: transparent;
      border: 1px solid var(--border-color);
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      color: var(--text-primary);
      overflow: hidden;
      outline: none;
    }

    .theme-btn:hover {
      background-color: var(--border-color);
      transform: scale(1.05);
    }

    .theme-btn .sun-svg {
      transition: transform 0.5s ease, opacity 0.3s ease;
    }

    .theme-btn .moon-svg {
      position: absolute;
      transition: transform 0.5s ease, opacity 0.3s ease;
      transform: translateY(30px) rotate(90deg);
      opacity: 0;
    }

    [data-theme="dark"] .theme-btn .sun-svg {
      transform: translateY(-30px) rotate(-90deg);
      opacity: 0;
    }

    [data-theme="dark"] .theme-btn .moon-svg {
      transform: translateY(0) rotate(0);
      opacity: 1;
    }

    /* RTL Layout Toggle Button */
    .rtl-btn {
      background: transparent;
      border: 1px solid var(--border-color);
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      color: var(--text-primary);
      overflow: hidden;
      outline: none;
      transition: var(--transition-smooth);
    }

    .rtl-btn:hover {
      background-color: var(--border-color);
      transform: scale(1.05);
    }

    .rtl-btn svg {
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    [dir="rtl"] .rtl-btn svg,
    .rtl-btn.rtl svg {
      transform: rotate(180deg);
    }

    /* Luxury Login Button - Styled to match reference design */
    .login-btn {
      background: var(--accent-gold);
      color: #FFFFFF;
      border: none;
      border-radius: 6px;
      padding: 10px 20px;
      font-family: var(--font-title);
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      outline: none;
      transition: var(--transition-fast);
    }

    .login-btn:hover {
      background-color: var(--accent-rose);
      transform: translateY(-2px);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .login-arrow {
      width: 16px;
      height: 16px;
      stroke-width: 2.5;
      transition: transform 0.3s ease;
    }

    .login-btn:hover .login-arrow {
      transform: translateX(calc(4px * var(--dir-sign)));
    }

    /* Hamburger Toggle Button */
    .mobile-menu-trigger {
      display: none;
      background: transparent;
      border: none;
      width: 44px;
      height: 44px;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      z-index: 1001;
      border-radius: 8px;
      border: 1px solid var(--border-color);
    }

    .hamburger-line {
      width: 20px;
      height: 2px;
      background-color: var(--text-primary);
      border-radius: 2px;
      transition: var(--transition-smooth);
    }

    .mobile-menu-trigger.open .hamburger-line:nth-child(1) {
      transform: translateY(7px) rotate(45deg);
    }

    .mobile-menu-trigger.open .hamburger-line:nth-child(2) {
      opacity: 0;
    }

    .mobile-menu-trigger.open .hamburger-line:nth-child(3) {
      transform: translateY(-7px) rotate(-45deg);
    }

    /* ----------------------------------------------------
       MOBILE SLIDE-OUT DRAWER
       ---------------------------------------------------- */
    .mobile-drawer-overlay {
      position: fixed;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      z-index: 999;
      opacity: 0;
      visibility: hidden;
      transition: var(--transition-smooth);
    }

    .mobile-drawer-overlay.open {
      opacity: 1;
      visibility: visible;
    }

    .mobile-drawer {
      position: fixed;
      top: 0;
      bottom: 0;
      width: 320px;
      max-width: 85vw;
      background-color: var(--bg-card);
      z-index: 1000;
      box-shadow: var(--shadow-lg);
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      transition: var(--transition-smooth);
      
      inset-inline-start: 0;
      transform: translateX(calc(-100% * var(--dir-sign)));
    }

    .mobile-drawer.open {
      transform: translateX(0);
    }

    .drawer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 16px;
    }

    .drawer-close-btn {
      background: transparent;
      border: 1px solid var(--border-color);
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-primary);
    }

    .drawer-close-btn:hover {
      background-color: var(--border-color);
    }

    .drawer-close-btn svg {
      width: 18px;
      height: 18px;
      stroke-width: 2.5;
    }

    .drawer-nav {
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow-y: auto;
      flex-grow: 1;
    }

    .drawer-nav-link {
      padding: 12px 16px;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-secondary);
      border-radius: 10px;
      transition: var(--transition-fast);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .drawer-nav-link:hover,
    .drawer-nav-link.active {
      color: var(--accent-rose);
      background-color: rgba(107, 35, 53, 0.06);
    }

    .drawer-category-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-inline-start: 16px;
      border-inline-start: 1px dashed var(--border-color);
      padding-inline-start: 12px;
      display: none;
    }

    .drawer-category-group.open {
      display: flex;
    }

    .drawer-sub-link {
      padding: 8px 12px;
      font-size: 0.875rem;
      color: var(--text-secondary);
      border-radius: 6px;
      transition: var(--transition-fast);
    }

    .drawer-sub-link:hover {
      color: var(--accent-gold);
      background-color: rgba(220, 161, 90, 0.08);
    }

    .drawer-footer {
      border-top: 1px solid var(--border-color);
      padding-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .drawer-actions {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    /* Toast Notifications styling */
    .toast-notif {
      position: fixed;
      bottom: 96px;
      inset-inline-end: 30px;
      background-color: var(--bg-card);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
      border-left: 4px solid var(--accent-gold);
      padding: 14px 24px;
      border-radius: 8px;
      box-shadow: var(--shadow-lg);
      font-weight: 600;
      z-index: 10000;
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0;
      transform: translateY(20px);
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
    }

    .toast-notif.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* ----------------------------------------------------
       HOME 1 UNIQUE STYLES
       ---------------------------------------------------- */
    .h1-hero {
      padding-top: 80px;
      padding-bottom: 80px;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 60px;
      align-items: center;
      margin-bottom: 80px;
    }

    .h1-hero-text {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .h1-hero-tag {
      color: var(--accent-gold);
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
    }

    .h1-hero-text h1 {
      font-size: 3.5rem;
      line-height: 1.2;
      font-weight: 800;
    }

    .h1-hero-text p {
      font-size: 1.1rem;
      color: var(--text-secondary);
      line-height: 1.7;
    }

    .h1-hero-actions {
      display: flex;
      gap: 16px;
      margin-top: 10px;
    }

    .h1-hero-img {
      border-radius: 30px;
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border-color);
    }

    .h1-hero-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: var(--transition-smooth);
    }

    .h1-hero-img:hover img {
      transform: scale(1.02);
    }

    /* Section 2: Interactive Flavor Wheel */
    .flavor-section {
      text-align: center;
      margin-bottom: 80px;
    }

    .flavor-section h2 {
      font-size: 2.2rem;
      margin-bottom: 12px;
    }

    .flavor-section p {
      color: var(--text-secondary);
      margin-bottom: 40px;
    }

    .flavor-wheel-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 60px;
      max-width: 1000px;
      margin: 0 auto;
      background-color: var(--bg-secondary);
      padding: 40px;
      border-radius: 24px;
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow-sm);
    }

    .flavor-wheel {
      width: 250px;
      height: 250px;
      border-radius: 50%;
      position: relative;
      background: conic-gradient(
        var(--accent-rose) 0% 20%,
        var(--accent-gold) 20% 40%,
        #9B6B75 40% 60%,
        #D4C5A0 60% 80%,
        #531522 80% 100%
      );
      box-shadow: var(--shadow-md);
      cursor: pointer;
      transition: transform 0.5s ease;
    }

    .flavor-wheel-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background-color: var(--bg-card);
      border: 2px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-title);
      font-weight: 800;
      color: var(--accent-rose);
      box-shadow: var(--shadow-sm);
    }

    .flavor-info-box {
      flex-grow: 1;
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 500px;
    }

    [dir="rtl"] .flavor-info-box {
      text-align: right;
    }

    .flavor-info-box h3 {
      font-size: 1.6rem;
      color: var(--accent-rose);
    }

    .flavor-info-box p {
      font-size: 0.95rem;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 0;
    }

    .flavor-tabs {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    .flavor-tab-btn {
      background-color: var(--bg-card);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
      padding: 8px 16px;
      border-radius: 20px;
      font-family: var(--font-title);
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition-fast);
    }

    .flavor-tab-btn.active,
    .flavor-tab-btn:hover {
      background-color: var(--accent-rose);
      color: #FFFFFF;
      border-color: var(--accent-rose);
    }

    /* Section 3: Bakery Craft Section */
    .craft-section {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 60px;
      align-items: center;
      margin-bottom: 80px;
    }

    .craft-img {
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border-color);
    }

    .craft-img img {
      width: 100%;
      display: block;
    }

    .craft-text {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .craft-text h2 {
      font-size: 2.2rem;
    }

    .craft-text p {
      font-size: 0.95rem;
      color: var(--text-secondary);
      line-height: 1.7;
    }

    /* Section 4: Custom Cake Builder Walkthrough */
    .builder-section {
      text-align: center;
      margin-bottom: 80px;
    }

    .builder-section h2 {
      font-size: 2.2rem;
      margin-bottom: 40px;
    }

    .builder-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
    }

    .builder-step {
      background-color: var(--bg-card);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 30px 20px;
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      position: relative;
    }

    .builder-step-num {
      width: 44px;
      height: 44px;
      background-color: rgba(212, 175, 55, 0.1);
      color: var(--accent-gold);
      border-radius: 50%;
      display: flex;
      align-items: center;

  <script>
    const htmlEl = document.documentElement;
    const toastNotif = document.getElementById('toastNotif');
    const toastMsg = document.getElementById('toastMsg');

    /* ----------------------------------------------------
       THEME CONTROLLER (LIGHT/DARK)
       ---------------------------------------------------- */
    function initTheme() {
      const savedTheme = localStorage.getItem('bakery-theme');
      if (savedTheme) {
        setTheme(savedTheme);
      } else {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        setTheme(prefersDark ? 'dark' : 'light');
      }
    }

    function setTheme(theme) {
      htmlEl.setAttribute('data-theme', theme);
      localStorage.setItem('bakery-theme', theme);
    }

    /* ----------------------------------------------------
       LAYOUT DIRECTION CONTROLLER (LTR/RTL)
       ---------------------------------------------------- */
    function initDirection() {
      const savedDir = localStorage.getItem('bakery-dir');
      if (savedDir) {
        setDirection(savedDir);
      } else {
        setDirection('ltr');
      }
    }

    function setDirection(dir) {
      htmlEl.setAttribute('dir', dir);
      localStorage.setItem('bakery-dir', dir);
    }

    /* ----------------------------------------------------
       TOAST ACTIONS
       ---------------------------------------------------- */
    let toastTimeout;
    function showToast(message) {
      toastMsg.innerText = message;
      toastNotif.classList.add('show');
      
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => {
        toastNotif.classList.remove('show');
      }, 3000);
    }
    window.showToast = showToast;

    const themeToggleBtn = document.getElementById('themeToggleBtn');
    function toggleThemeAction() {
      const currentTheme = htmlEl.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      setTheme(newTheme);
      showToast(`Switched to ${newTheme.toUpperCase()} theme`);
    }
    if (themeToggleBtn) {
      themeToggleBtn.addEventListener('click', toggleThemeAction);
    }

    const rtlToggleBtn = document.getElementById('rtlToggleBtn');
    function toggleDirectionAction() {
      const currentDir = htmlEl.getAttribute('dir');
      const newDir = currentDir === 'rtl' ? 'ltr' : 'rtl';
      setDirection(newDir);
      showToast(`Switched layout to ${newDir.toUpperCase()}`);
    }
    if (rtlToggleBtn) {
      rtlToggleBtn.addEventListener('click', toggleDirectionAction);
    }

    // Initializations
    initTheme();
    initDirection();

    // Logo FAB Scroll-to-Top Behavior
    const logoFab = document.getElementById('logoFab');
    if (logoFab) {
      window.addEventListener('scroll', () => {
        if (window.scrollY > 300) {
          logoFab.classList.add('show');
        } else {
          logoFab.classList.remove('show');
        }
      });
      logoFab.addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    }
</script>
